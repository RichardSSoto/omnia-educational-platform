<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmnIA Chat - Redirigiendo...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .redirect-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 20px;
        }
        
        .icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .countdown {
            font-size: 1.5em;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
        }
        
        .actions {
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,123,255,0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #545b62);
        }
        
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #007bff;
            text-align: left;
        }
        
        .info h3 {
            color: #007bff;
            margin-bottom: 10px;
        }
    </style>
    
    <script>
        console.log('💬 Preparando redirección a OmnIA Chat...');
        
        // URL del chat de InConcert
        var chatURL = 'https://webchat-cls49-boc.i6.inconcertcc.com/v3/click_to_chat?token=C071A650B859D3DCC63BEE1A3CDA2489';
        
        // Configuración desde localStorage
        var config = {
            materia: localStorage.getItem('materia') || '58_Estadistica_y_probabilidad',
            tipoBase: localStorage.getItem('tipoBase') || 'materia'
        };
        
        console.log('📚 Configuración OmnIA:', config);
        
        // Countdown y redirección automática
        var seconds = 5;
        var countdownEl;
        
        function updateCountdown() {
            if (countdownEl) {
                countdownEl.textContent = seconds;
            }
            
            if (seconds <= 0) {
                redirectToChat();
            } else {
                seconds--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        function redirectToChat() {
            console.log('🚀 Redirigiendo al chat de InConcert...');
            window.location.href = chatURL;
        }
        
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = './index.html';
            }
        }
        
        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            countdownEl = document.getElementById('countdown-number');
            
            // Iniciar countdown
            setTimeout(function() {
                updateCountdown();
            }, 1000);
            
            console.log('✅ Página de redirección inicializada');
        });
    </script>
</head>
<body>
    <div class="redirect-container">
        <div class="icon">💬</div>
        
        <h1>OmnIA Chat</h1>
        <p class="subtitle">Conectando con tu asistente educativo...</p>
        
        <div class="countdown">
            Redirigiendo en <span id="countdown-number">5</span> segundos
        </div>
        
        <div class="actions">
            <a href="#" onclick="redirectToChat(); return false;" class="btn">
                🚀 Abrir Chat Ahora
            </a>
            
            <a href="#" onclick="goBack(); return false;" class="btn btn-secondary">
                ← Volver Atrás
            </a>
        </div>
        
        <div class="info">
            <h3>ℹ️ Acerca de OmnIA Chat</h3>
            <p>
                <strong>Materia configurada:</strong> <span id="current-materia">Estadística y Probabilidad</span><br>
                <strong>Tipo de base:</strong> <span id="current-tipo">Materia</span><br>
                <strong>Proveedor:</strong> InConcert WebChat
            </p>
        </div>
    </div>

    <script>
        // Mostrar configuración actual
        document.addEventListener('DOMContentLoaded', function() {
            var materiaEl = document.getElementById('current-materia');
            var tipoEl = document.getElementById('current-tipo');
            
            var savedMateria = localStorage.getItem('materia');
            var savedTipo = localStorage.getItem('tipoBase');
            
            if (savedMateria && materiaEl) {
                materiaEl.textContent = savedMateria.replace(/_/g, ' ');
            }
            
            if (savedTipo && tipoEl) {
                tipoEl.textContent = savedTipo.charAt(0).toUpperCase() + savedTipo.slice(1);
            }
        });
    </script>
</body>
</html>
