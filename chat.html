<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmnIA Chat Widget</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .chat-header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .chat-header h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .chat-header p {
            font-size: 1.2em;
            margin: 10px 0;
            opacity: 0.9;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .status {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
    
    <!-- InConcert Chat Widget - Snippet directo -->
    <script type='text/javascript'>
        console.log('💬 Cargando OmnIA Chat Widget directamente...');
        
        // Configuración del widget
        window.ChatParams = {
            materia: localStorage.getItem('materia') || '58_Estadistica_y_probabilidad',
            tipoBase: localStorage.getItem('tipoBase') || 'materia'
        };
        
        console.log('📚 Configuración:', window.ChatParams);
    </script>
</head>
<body>
    <div class="chat-header">
        <h1>💬 OmnIA Chat</h1>
        <p>Asistente Educativo Inteligente</p>
    </div>
    
    <div class="chat-container">
        <div id="chat-status" class="status">
            🔄 Inicializando chat widget...
        </div>
        
        <!-- El widget de InConcert se cargará aquí automáticamente -->
        <div id="chat-widget-area"></div>
    </div>

    <!-- InConcert Widget Script - Carga directa -->
    <script type='text/javascript'>
        (function() {
            var proto = window.location.protocol || 'https:';
            var node = document.createElement('script');
            node.type = 'text/javascript'; 
            node.async = true;
            node.src = proto + '//webchat-cls49-boc.i6.inconcertcc.com/v3/click_to_chat?token=C071A650B859D3DCC63BEE1A3CDA2489';
            var s = document.getElementsByTagName('script')[0]; 
            s.parentNode.insertBefore(node, s);
            
            // Actualizar estado
            setTimeout(function() {
                document.getElementById('chat-status').innerHTML = '✅ Chat widget cargado - InConcert activo';
            }, 3000);
            
            console.log('📤 Widget de InConcert integrado');
        })();
    </script>
</body>
</html>
